<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#1a1040"/>
      <stop offset="40%" stop-color="#2a1855"/>
      <stop offset="70%" stop-color="#0f2040"/>
      <stop offset="100%" stop-color="#0a0a15"/>
    </linearGradient>
    <radialGradient id="g1" cx="20%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="g2" cx="80%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#0891b2" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#c4b5fd" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#g1)"/>
  <rect width="1920" height="1080" fill="url(#g2)"/>
  <!-- Noise/diffusion visual metaphor -->
  <text x="960" y="380" font-family="system-ui" font-size="96" fill="#ffffff" text-anchor="middle" font-weight="700" filter="url(#glow)">Narrative Diffusion</text>
  <text x="960" y="470" font-family="system-ui" font-size="36" fill="rgba(255,255,255,0.6)" text-anchor="middle">The Multi-Pass Scripting Method That Makes AI Scripts Sound Human</text>
  <!-- Pass indicators -->
  <text x="380" y="650" font-family="monospace" font-size="28" fill="rgba(255,255,255,0.25)" text-anchor="middle">░░░░░░░░░</text>
  <text x="600" y="650" font-family="monospace" font-size="28" fill="rgba(255,255,255,0.35)" text-anchor="middle">▓▓▓░░░░░░</text>
  <text x="820" y="650" font-family="monospace" font-size="28" fill="rgba(255,255,255,0.5)" text-anchor="middle">▓▓▓▓▓▓░░░</text>
  <text x="1040" y="650" font-family="monospace" font-size="28" fill="rgba(255,255,255,0.65)" text-anchor="middle">▓▓▓▓▓▓▓▓░</text>
  <text x="1260" y="650" font-family="monospace" font-size="28" fill="rgba(255,255,255,0.85)" text-anchor="middle">▓▓▓▓▓▓▓▓▓</text>
  <text x="380" y="690" font-family="system-ui" font-size="18" fill="rgba(255,255,255,0.3)" text-anchor="middle">noise</text>
  <text x="600" y="690" font-family="system-ui" font-size="18" fill="rgba(255,255,255,0.4)" text-anchor="middle">structure</text>
  <text x="820" y="690" font-family="system-ui" font-size="18" fill="rgba(255,255,255,0.5)" text-anchor="middle">draft</text>
  <text x="1040" y="690" font-family="system-ui" font-size="18" fill="rgba(255,255,255,0.6)" text-anchor="middle">enrich</text>
  <text x="1260" y="690" font-family="system-ui" font-size="18" fill="rgba(255,255,255,0.8)" text-anchor="middle">polish</text>
  <!-- Arrows -->
  <text x="490" y="650" font-family="system-ui" font-size="28" fill="rgba(255,255,255,0.3)" text-anchor="middle">→</text>
  <text x="710" y="650" font-family="system-ui" font-size="28" fill="rgba(255,255,255,0.4)" text-anchor="middle">→</text>
  <text x="930" y="650" font-family="system-ui" font-size="28" fill="rgba(255,255,255,0.5)" text-anchor="middle">→</text>
  <text x="1150" y="650" font-family="system-ui" font-size="28" fill="rgba(255,255,255,0.6)" text-anchor="middle">→</text>
</svg>
