  <rect x="30" y="228" width="900" height="36" rx="8" fill="rgba(255,255,255,0.06)"/>
  <text x="50" y="251" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.4)">Scripts:</text>
  <text x="110" y="251" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.6)" text-anchor="middle">Blank page</text>
