<svg xmlns="http://www.w3.org/2000/svg" width="960" height="400" viewBox="0 0 960 400">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#7b8fcc"/>
      <stop offset="30%" stop-color="#b08aaf"/>
      <stop offset="55%" stop-color="#d98a8a"/>
      <stop offset="80%" stop-color="#e8a585"/>
      <stop offset="100%" stop-color="#f0c89a"/>
    </linearGradient>
    <radialGradient id="glowTL" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#8ba0e0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glowBR" cx="100%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#f5c490" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glowTR" cx="100%" cy="0%" r="50%">
      <stop offset="0%" stop-color="#d88a90" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glowBL" cx="0%" cy="100%" r="50%">
      <stop offset="0%" stop-color="#c8a0b8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glowCenter" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#ffe0c0" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#ffe8d0" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="960" height="400" rx="12" fill="url(#sky)"/>
  <rect width="960" height="400" rx="12" fill="url(#glowTL)"/>
  <rect width="960" height="400" rx="12" fill="url(#glowBR)"/>
  <rect width="960" height="400" rx="12" fill="url(#glowTR)"/>
  <rect width="960" height="400" rx="12" fill="url(#glowBL)"/>
  <rect width="960" height="400" rx="12" fill="url(#glowCenter)"/>
  <!-- Left panel -->
  <rect x="30" y="30" width="435" height="340" rx="12" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)"/>
  <text x="247" y="78" font-family="system-ui" font-size="22" fill="#fff0f0" text-anchor="middle" font-weight="600" filter="url(#softglow)">Single-Pass Prompting</text>
  <text x="247" y="116" font-family="system-ui" font-size="16" fill="rgba(255,255,255,0.7)" text-anchor="middle">"Write a 10-min script about Rome"</text>
  <line x1="65" y1="140" x2="430" y2="140" stroke="rgba(255,255,255,0.15)"/>
  <text x="75" y="178" font-family="system-ui" font-size="16" fill="rgba(255,255,255,0.75)">Generic Wikipedia-rewrite energy</text>
  <text x="75" y="210" font-family="system-ui" font-size="16" fill="rgba(255,255,255,0.75)">Predictable structure every time</text>
  <text x="75" y="242" font-family="system-ui" font-size="16" fill="rgba(255,255,255,0.75)">Sounds like "let's dive in" AI slop</text>
  <text x="75" y="274" font-family="system-ui" font-size="16" fill="rgba(255,255,255,0.75)">Viewers click away in 5 seconds</text>
  <text x="75" y="330" font-family="system-ui" font-size="28" fill="#fff0f0" font-weight="700" filter="url(#softglow)">1 pass</text>
  <!-- Right panel -->
  <rect x="495" y="30" width="435" height="340" rx="12" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)"/>
  <text x="712" y="78" font-family="system-ui" font-size="22" fill="#f0f0ff" text-anchor="middle" font-weight="600" filter="url(#softglow)">Multi-Pass Narrative Diffusion</text>
  <text x="712" y="116" font-family="system-ui" font-size="16" fill="rgba(255,255,255,0.7)" text-anchor="middle">Structure → Narration → Visuals → Polish</text>
  <line x1="530" y1="140" x2="895" y2="140" stroke="rgba(255,255,255,0.15)"/>
  <text x="540" y="178" font-family="system-ui" font-size="16" fill="rgba(255,255,255,0.85)">Original narrative with texture</text>
  <text x="540" y="210" font-family="system-ui" font-size="16" fill="rgba(255,255,255,0.85)">Natural pacing and emotional arc</text>
  <text x="540" y="242" font-family="system-ui" font-size="16" fill="rgba(255,255,255,0.85)">Visual prompts match story beats</text>
  <text x="540" y="274" font-family="system-ui" font-size="16" fill="rgba(255,255,255,0.85)">Viewers watch to the end</text>
  <text x="540" y="330" font-family="system-ui" font-size="28" fill="#f0f0ff" font-weight="700" filter="url(#softglow)">4 passes</text>
</svg>
