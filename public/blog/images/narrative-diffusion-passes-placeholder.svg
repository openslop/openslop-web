<svg xmlns="http://www.w3.org/2000/svg" width="960" height="480" viewBox="0 0 960 480">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#7b8fcc"/>
      <stop offset="30%" stop-color="#b08aaf"/>
      <stop offset="55%" stop-color="#d98a8a"/>
      <stop offset="80%" stop-color="#e8a585"/>
      <stop offset="100%" stop-color="#f0c89a"/>
    </linearGradient>
    <radialGradient id="glowTL" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#8ba0e0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glowBR" cx="100%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#f5c490" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glowTR" cx="100%" cy="0%" r="50%">
      <stop offset="0%" stop-color="#d88a90" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glowBL" cx="0%" cy="100%" r="50%">
      <stop offset="0%" stop-color="#c8a0b8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#ffe8d0" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="960" height="480" rx="12" fill="url(#sky)"/>
  <rect width="960" height="480" rx="12" fill="url(#glowTL)"/>
  <rect width="960" height="480" rx="12" fill="url(#glowBR)"/>
  <rect width="960" height="480" rx="12" fill="url(#glowTR)"/>
  <rect width="960" height="480" rx="12" fill="url(#glowBL)"/>
  <text x="480" y="44" font-family="system-ui" font-size="22" fill="#ffffff" text-anchor="middle" font-weight="600" filter="url(#softglow)">The 5 Passes of Narrative Diffusion</text>
  <!-- Pass 1 -->
  <rect x="30" y="65" width="170" height="390" rx="12" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)"/>
  <text x="115" y="100" font-family="system-ui" font-size="36" fill="#ffffff" text-anchor="middle" font-weight="700" filter="url(#softglow)">1</text>
  <text x="115" y="130" font-family="system-ui" font-size="17" fill="#ffffff" text-anchor="middle" font-weight="600">Structure</text>
  <text x="115" y="160" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.8)" text-anchor="middle">Story beats</text>
  <text x="115" y="182" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.8)" text-anchor="middle">Act structure</text>
  <text x="115" y="204" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.8)" text-anchor="middle">Emotional arc</text>
  <text x="115" y="226" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.8)" text-anchor="middle">Hook + payoff</text>
  <rect x="50" y="260" width="130" height="50" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)"/>
  <text x="115" y="282" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.6)" text-anchor="middle">|||||||||||</text>
  <text x="115" y="296" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.6)" text-anchor="middle">skeleton</text>
  <text x="115" y="430" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.5)" text-anchor="middle">Noise</text>
  <!-- Arrow 1 -->
  <text x="210" y="250" font-family="system-ui" font-size="22" fill="rgba(255,255,255,0.5)" text-anchor="middle">→</text>
  <!-- Pass 2 -->
  <rect x="218" y="65" width="170" height="390" rx="12" fill="rgba(255,255,255,0.14)" stroke="rgba(255,255,255,0.2)"/>
  <text x="303" y="100" font-family="system-ui" font-size="36" fill="#ffffff" text-anchor="middle" font-weight="700" filter="url(#softglow)">2</text>
  <text x="303" y="130" font-family="system-ui" font-size="17" fill="#ffffff" text-anchor="middle" font-weight="600">Draft</text>
  <text x="303" y="160" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.8)" text-anchor="middle">5th grade level</text>
  <text x="303" y="182" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.8)" text-anchor="middle">Written for ear</text>
  <text x="303" y="204" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.8)" text-anchor="middle">Short sentences</text>
  <text x="303" y="226" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.8)" text-anchor="middle">Natural rhythm</text>
  <rect x="238" y="260" width="130" height="50" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)"/>
  <text x="303" y="282" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.6)" text-anchor="middle">▓▓▓▓░░░░░</text>
  <text x="303" y="296" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.6)" text-anchor="middle">rough shape</text>
  <text x="303" y="430" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.5)" text-anchor="middle">General shapes</text>
  <!-- Arrow 2 -->
  <text x="398" y="250" font-family="system-ui" font-size="22" fill="rgba(255,255,255,0.5)" text-anchor="middle">→</text>
  <!-- Pass 3 -->
  <rect x="406" y="65" width="170" height="390" rx="12" fill="rgba(255,255,255,0.16)" stroke="rgba(255,255,255,0.2)"/>
  <text x="491" y="100" font-family="system-ui" font-size="36" fill="#ffffff" text-anchor="middle" font-weight="700" filter="url(#softglow)">3</text>
  <text x="491" y="130" font-family="system-ui" font-size="17" fill="#ffffff" text-anchor="middle" font-weight="600">Enrich</text>
  <text x="491" y="160" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.8)" text-anchor="middle">Sensory detail</text>
  <text x="491" y="182" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.8)" text-anchor="middle">Keep continuity</text>
  <text x="491" y="204" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.8)" text-anchor="middle">Make it longer</text>
  <text x="491" y="226" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.8)" text-anchor="middle">Richer texture</text>
  <rect x="426" y="260" width="130" height="50" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)"/>
  <text x="491" y="282" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.6)" text-anchor="middle">▓▓▓▓▓▓▓░░</text>
  <text x="491" y="296" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.6)" text-anchor="middle">detail added</text>
  <text x="491" y="430" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.5)" text-anchor="middle">Fine detail</text>
  <!-- Arrow 3 -->
  <text x="586" y="250" font-family="system-ui" font-size="22" fill="rgba(255,255,255,0.5)" text-anchor="middle">→</text>
  <!-- Pass 4 -->
  <rect x="594" y="65" width="170" height="390" rx="12" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.2)"/>
  <text x="679" y="100" font-family="system-ui" font-size="36" fill="#ffffff" text-anchor="middle" font-weight="700" filter="url(#softglow)">4</text>
  <text x="679" y="130" font-family="system-ui" font-size="17" fill="#ffffff" text-anchor="middle" font-weight="600">Polish</text>
  <text x="679" y="160" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.8)" text-anchor="middle">Kill LLM-isms</text>
  <text x="679" y="182" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.8)" text-anchor="middle">Vary sentence length</text>
  <text x="679" y="204" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.8)" text-anchor="middle">Open with tension</text>
  <text x="679" y="226" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.8)" text-anchor="middle">Remove giveaways</text>
  <rect x="614" y="260" width="130" height="50" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)"/>
  <text x="679" y="282" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.6)" text-anchor="middle">▓▓▓▓▓▓▓▓▓</text>
  <text x="679" y="296" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.6)" text-anchor="middle">refined</text>
  <text x="679" y="430" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.5)" text-anchor="middle">Sharp output</text>
  <!-- Arrow 4 -->
  <text x="774" y="250" font-family="system-ui" font-size="22" fill="rgba(255,255,255,0.5)" text-anchor="middle">→</text>
  <!-- Pass 5 -->
  <rect x="782" y="65" width="148" height="390" rx="12" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.15)" stroke-dasharray="6,4"/>
  <text x="856" y="100" font-family="system-ui" font-size="36" fill="#ffffff" text-anchor="middle" font-weight="700" filter="url(#softglow)">5</text>
  <text x="856" y="130" font-family="system-ui" font-size="17" fill="#ffffff" text-anchor="middle" font-weight="600">Visuals</text>
  <text x="856" y="155" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.6)" text-anchor="middle">(optional)</text>
  <text x="856" y="185" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.8)" text-anchor="middle">Image prompts</text>
  <text x="856" y="207" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.8)" text-anchor="middle">Camera angles</text>
  <text x="856" y="229" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.8)" text-anchor="middle">Animate tags</text>
  <rect x="802" y="260" width="110" height="50" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)"/>
  <text x="856" y="282" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.6)" text-anchor="middle">🎬 / 📷</text>
  <text x="856" y="296" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.6)" text-anchor="middle">tagged</text>
  <text x="856" y="430" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.5)" text-anchor="middle">Production-ready</text>
  <!-- Bottom label -->
  <text x="480" y="468" font-family="system-ui" font-size="14" fill="rgba(255,255,255,0.5)" text-anchor="middle">Like Stable Diffusion: noise → general shapes → fine detail → sharp output</text>
</svg>
