<svg xmlns="http://www.w3.org/2000/svg" width="960" height="380" viewBox="0 0 960 380">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#7b8fcc"/>
      <stop offset="30%" stop-color="#b08aaf"/>
      <stop offset="55%" stop-color="#d98a8a"/>
      <stop offset="80%" stop-color="#e8a585"/>
      <stop offset="100%" stop-color="#f0c89a"/>
    </linearGradient>
    <radialGradient id="glowTL" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#8ba0e0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glowBR" cx="100%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#f5c490" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glowTR" cx="100%" cy="0%" r="50%">
      <stop offset="0%" stop-color="#d88a90" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glowBL" cx="0%" cy="100%" r="50%">
      <stop offset="0%" stop-color="#c8a0b8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#ffe8d0" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="960" height="380" rx="12" fill="url(#sky)"/>
  <rect width="960" height="380" rx="12" fill="url(#glowTL)"/>
  <rect width="960" height="380" rx="12" fill="url(#glowBR)"/>
  <rect width="960" height="380" rx="12" fill="url(#glowTR)"/>
  <rect width="960" height="380" rx="12" fill="url(#glowBL)"/>
  <text x="480" y="44" font-family="system-ui" font-size="22" fill="#ffffff" text-anchor="middle" font-weight="600" filter="url(#softglow)">Single-Pass vs Narrative Diffusion Output</text>
  <!-- Left: Single pass example -->
  <rect x="30" y="65" width="435" height="290" rx="12" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)"/>
  <text x="247" y="100" font-family="system-ui" font-size="18" fill="#ffffff" text-anchor="middle" font-weight="600" filter="url(#softglow)">❌ Single Pass</text>
  <line x1="65" y1="118" x2="430" y2="118" stroke="rgba(255,255,255,0.15)"/>
  <text x="75" y="148" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.75)" font-style="italic">"Rome, the Eternal City, has captivated</text>
  <text x="75" y="168" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.75)" font-style="italic">the imagination of millions throughout</text>
  <text x="75" y="188" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.75)" font-style="italic">history. Let's dive into the fascinating</text>
  <text x="75" y="208" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.75)" font-style="italic">journey of this remarkable civilization..."</text>
  <line x1="65" y1="228" x2="430" y2="228" stroke="rgba(255,255,255,0.1)"/>
  <text x="75" y="255" font-family="system-ui" font-size="14" fill="rgba(255,255,255,0.5)">Wikipedia energy. Predictable. Flat.</text>
  <text x="75" y="278" font-family="system-ui" font-size="14" fill="rgba(255,255,255,0.5)">Viewers bounce in 5 seconds.</text>
  <text x="247" y="340" font-family="system-ui" font-size="26" fill="#ffffff" text-anchor="middle" font-weight="700" filter="url(#softglow)">~15% retention</text>
  <!-- Right: Multi pass example -->
  <rect x="495" y="65" width="435" height="290" rx="12" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)"/>
  <text x="712" y="100" font-family="system-ui" font-size="18" fill="#ffffff" text-anchor="middle" font-weight="600" filter="url(#softglow)">✅ Narrative Diffusion (5 passes)</text>
  <line x1="530" y1="118" x2="895" y2="118" stroke="rgba(255,255,255,0.15)"/>
  <text x="540" y="148" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.85)" font-style="italic">"The soldier's sandal caught on a loose</text>
  <text x="540" y="168" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.85)" font-style="italic">cobblestone. He looked up. Smoke.</text>
  <text x="540" y="188" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.85)" font-style="italic">The Senate was burning. And with it,</text>
  <text x="540" y="208" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.85)" font-style="italic">everything Rome had promised him."</text>
  <line x1="530" y1="228" x2="895" y2="228" stroke="rgba(255,255,255,0.1)"/>
  <text x="540" y="255" font-family="system-ui" font-size="14" fill="rgba(255,255,255,0.6)">Tension. Sensory detail. Human.</text>
  <text x="540" y="278" font-family="system-ui" font-size="14" fill="rgba(255,255,255,0.6)">Viewers watch to the end.</text>
  <text x="712" y="340" font-family="system-ui" font-size="26" fill="#ffffff" text-anchor="middle" font-weight="700" filter="url(#softglow)">~45% retention</text>
</svg>
