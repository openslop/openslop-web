<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#7b8fcc"/>
      <stop offset="30%" stop-color="#b08aaf"/>
      <stop offset="55%" stop-color="#d98a8a"/>
      <stop offset="80%" stop-color="#e8a585"/>
      <stop offset="100%" stop-color="#f0c89a"/>
    </linearGradient>
    <radialGradient id="glowTL" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#8ba0e0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glowBR" cx="100%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#f5c490" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glowTR" cx="100%" cy="0%" r="50%">
      <stop offset="0%" stop-color="#d88a90" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glowBL" cx="0%" cy="100%" r="50%">
      <stop offset="0%" stop-color="#c8a0b8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glowCenter" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#ffe0c0" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#ffe8d0" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="960" height="360" rx="12" fill="url(#sky)"/>
  <rect width="960" height="360" rx="12" fill="url(#glowTL)"/>
  <rect width="960" height="360" rx="12" fill="url(#glowBR)"/>
  <rect width="960" height="360" rx="12" fill="url(#glowTR)"/>
  <rect width="960" height="360" rx="12" fill="url(#glowBL)"/>
  <rect width="960" height="360" rx="12" fill="url(#glowCenter)"/>
  <!-- Left: Scene-by-Scene -->
  <text x="240" y="42" font-family="system-ui" font-size="20" fill="#fff0f0" text-anchor="middle" font-weight="600" filter="url(#softglow)">Scene-by-Scene Generation</text>
  <g transform="translate(30, 65)">
    <rect width="160" height="110" rx="8" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <text x="80" y="60" font-family="system-ui" font-size="16" fill="rgba(255,255,255,0.8)" text-anchor="middle">Scene 1</text>
    <circle cx="80" cy="38" r="14" fill="rgba(255,200,200,0.35)"/>
  </g>
  <g transform="translate(210, 65)">
    <rect width="160" height="110" rx="8" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <text x="80" y="60" font-family="system-ui" font-size="16" fill="rgba(255,255,255,0.8)" text-anchor="middle">Scene 2</text>
    <circle cx="80" cy="38" r="17" fill="rgba(255,220,180,0.35)"/>
  </g>
  <g transform="translate(30, 190)">
    <rect width="160" height="110" rx="8" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <text x="80" y="60" font-family="system-ui" font-size="16" fill="rgba(255,255,255,0.8)" text-anchor="middle">Scene 3</text>
    <circle cx="80" cy="38" r="12" fill="rgba(180,220,255,0.35)"/>
  </g>
  <text x="290" y="258" font-family="system-ui" font-size="15" fill="rgba(255,255,255,0.5)" text-anchor="middle" font-style="italic">Different sizes = character drift</text>
  <text x="240" y="330" font-family="system-ui" font-size="16" fill="rgba(255,255,255,0.75)" text-anchor="middle">Character drifts every scene —</text>
  <text x="240" y="352" font-family="system-ui" font-size="16" fill="rgba(255,255,255,0.75)" text-anchor="middle">different hair, face, proportions</text>
  <!-- Right: Storyboard Batch -->
  <text x="720" y="42" font-family="system-ui" font-size="20" fill="#f0fff5" text-anchor="middle" font-weight="600" filter="url(#softglow)">Storyboard Batch Generation</text>
  <g transform="translate(510, 65)">
    <rect width="160" height="110" rx="8" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <text x="80" y="60" font-family="system-ui" font-size="16" fill="rgba(255,255,255,0.8)" text-anchor="middle">Scene 1</text>
    <circle cx="80" cy="38" r="14" fill="rgba(200,255,220,0.35)"/>
  </g>
  <g transform="translate(690, 65)">
    <rect width="160" height="110" rx="8" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <text x="80" y="60" font-family="system-ui" font-size="16" fill="rgba(255,255,255,0.8)" text-anchor="middle">Scene 2</text>
    <circle cx="80" cy="38" r="14" fill="rgba(200,255,220,0.35)"/>
  </g>
  <g transform="translate(600, 190)">
    <rect width="160" height="110" rx="8" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <text x="80" y="60" font-family="system-ui" font-size="16" fill="rgba(255,255,255,0.8)" text-anchor="middle">Scene 3</text>
    <circle cx="80" cy="38" r="14" fill="rgba(200,255,220,0.35)"/>
  </g>
  <text x="760" y="258" font-family="system-ui" font-size="15" fill="rgba(255,255,255,0.5)" text-anchor="middle" font-style="italic">Same size = consistent</text>
  <text x="720" y="330" font-family="system-ui" font-size="16" fill="rgba(255,255,255,0.85)" text-anchor="middle">Same reference + locked seed =</text>
  <text x="720" y="352" font-family="system-ui" font-size="16" fill="rgba(255,255,255,0.85)" text-anchor="middle">consistent character across all scenes</text>
</svg>
