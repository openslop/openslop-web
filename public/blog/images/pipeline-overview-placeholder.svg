<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#7b8fcc"/>
      <stop offset="30%" stop-color="#b08aaf"/>
      <stop offset="55%" stop-color="#d98a8a"/>
      <stop offset="80%" stop-color="#e8a585"/>
      <stop offset="100%" stop-color="#f0c89a"/>
    </linearGradient>
    <radialGradient id="glowTL" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#8ba0e0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glowBR" cx="100%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#f5c490" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glowTR" cx="100%" cy="0%" r="50%">
      <stop offset="0%" stop-color="#d88a90" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glowBL" cx="0%" cy="100%" r="50%">
      <stop offset="0%" stop-color="#c8a0b8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glowCenter" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#ffe0c0" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#ffe8d0" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="rgba(255,255,255,0.55)"/>
    </marker>
  </defs>
  <rect width="960" height="420" rx="12" fill="url(#sky)"/>
  <rect width="960" height="420" rx="12" fill="url(#glowTL)"/>
  <rect width="960" height="420" rx="12" fill="url(#glowBR)"/>
  <rect width="960" height="420" rx="12" fill="url(#glowTR)"/>
  <rect width="960" height="420" rx="12" fill="url(#glowBL)"/>
  <rect width="960" height="420" rx="12" fill="url(#glowCenter)"/>
  <!-- Claude -->
  <rect x="20" y="145" width="140" height="100" rx="10" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <text x="90" y="190" font-family="system-ui" font-size="17" fill="#ffffff" text-anchor="middle" font-weight="600">Claude</text>
  <text x="90" y="215" font-family="system-ui" font-size="14" fill="rgba(255,255,255,0.7)" text-anchor="middle">Script + Prompts</text>
  <line x1="160" y1="195" x2="195" y2="195" stroke="rgba(255,255,255,0.5)" stroke-width="2.5" marker-end="url(#arrow)"/>
  <!-- Runware -->
  <rect x="195" y="145" width="140" height="100" rx="10" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <text x="265" y="190" font-family="system-ui" font-size="17" fill="#ffffff" text-anchor="middle" font-weight="600">Runware</text>
  <text x="265" y="215" font-family="system-ui" font-size="14" fill="rgba(255,255,255,0.7)" text-anchor="middle">200 images</text>
  <!-- Branch lines -->
  <line x1="335" y1="185" x2="375" y2="155" stroke="rgba(255,255,255,0.5)" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="335" y1="205" x2="375" y2="235" stroke="rgba(255,255,255,0.5)" stroke-width="2.5" marker-end="url(#arrow)"/>
  <!-- Kling -->
  <rect x="375" y="110" width="140" height="80" rx="10" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <text x="445" y="147" font-family="system-ui" font-size="17" fill="#ffffff" text-anchor="middle" font-weight="600">Kling</text>
  <text x="445" y="172" font-family="system-ui" font-size="14" fill="rgba(255,255,255,0.7)" text-anchor="middle">20% animated</text>
  <!-- ffmpeg Ken Burns -->
  <rect x="375" y="210" width="140" height="80" rx="10" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <text x="445" y="247" font-family="system-ui" font-size="17" fill="#ffffff" text-anchor="middle" font-weight="600">ffmpeg</text>
  <text x="445" y="272" font-family="system-ui" font-size="14" fill="rgba(255,255,255,0.7)" text-anchor="middle">80% Ken Burns</text>
  <!-- Merge lines -->
  <line x1="515" y1="150" x2="555" y2="170" stroke="rgba(255,255,255,0.5)" stroke-width="2.5"/>
  <line x1="515" y1="250" x2="555" y2="230" stroke="rgba(255,255,255,0.5)" stroke-width="2.5"/>
  <!-- Cartesia -->
  <rect x="555" y="120" width="120" height="70" rx="10" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <text x="615" y="153" font-family="system-ui" font-size="17" fill="#ffffff" text-anchor="middle" font-weight="600">Cartesia</text>
  <text x="615" y="176" font-family="system-ui" font-size="14" fill="rgba(255,255,255,0.7)" text-anchor="middle">Voiceover</text>
  <!-- ElevenLabs -->
  <rect x="555" y="210" width="120" height="70" rx="10" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <text x="615" y="243" font-family="system-ui" font-size="17" fill="#ffffff" text-anchor="middle" font-weight="600">ElevenLabs</text>
  <text x="615" y="266" font-family="system-ui" font-size="14" fill="rgba(255,255,255,0.7)" text-anchor="middle">Music</text>
  <!-- Merge to assembly -->
  <line x1="675" y1="160" x2="715" y2="185" stroke="rgba(255,255,255,0.5)" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="675" y1="245" x2="715" y2="215" stroke="rgba(255,255,255,0.5)" stroke-width="2.5" marker-end="url(#arrow)"/>
  <!-- ffmpeg Assembly -->
  <rect x="715" y="150" width="120" height="100" rx="10" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <text x="775" y="195" font-family="system-ui" font-size="17" fill="#ffffff" text-anchor="middle" font-weight="600">ffmpeg</text>
  <text x="775" y="220" font-family="system-ui" font-size="14" fill="rgba(255,255,255,0.7)" text-anchor="middle">Assembly</text>
  <line x1="835" y1="200" x2="860" y2="200" stroke="rgba(255,255,255,0.5)" stroke-width="2.5" marker-end="url(#arrow)"/>
  <!-- Video output -->
  <rect x="860" y="155" width="80" height="90" rx="10" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <text x="900" y="196" font-family="system-ui" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="700" filter="url(#softglow)">Video</text>
  <text x="900" y="222" font-family="system-ui" font-size="14" fill="#f0fff5" text-anchor="middle">~$2</text>
  <!-- Footer -->
  <text x="480" y="380" font-family="system-ui" font-size="18" fill="rgba(255,255,255,0.7)" text-anchor="middle">Full pipeline: prompt in → finished video out in ~20 minutes</text>
</svg>
