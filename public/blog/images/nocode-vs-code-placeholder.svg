<svg xmlns="http://www.w3.org/2000/svg" width="960" height="380" viewBox="0 0 960 380">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#7b8fcc"/>
      <stop offset="30%" stop-color="#b08aaf"/>
      <stop offset="55%" stop-color="#d98a8a"/>
      <stop offset="80%" stop-color="#e8a585"/>
      <stop offset="100%" stop-color="#f0c89a"/>
    </linearGradient>
    <radialGradient id="glowTL" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#8ba0e0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glowBR" cx="100%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#f5c490" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glowTR" cx="100%" cy="0%" r="50%">
      <stop offset="0%" stop-color="#d88a90" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glowBL" cx="0%" cy="100%" r="50%">
      <stop offset="0%" stop-color="#c8a0b8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glowCenter" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#ffe0c0" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#ffe8d0" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="960" height="380" rx="12" fill="url(#sky)"/>
  <rect width="960" height="380" rx="12" fill="url(#glowTL)"/>
  <rect width="960" height="380" rx="12" fill="url(#glowBR)"/>
  <rect width="960" height="380" rx="12" fill="url(#glowTR)"/>
  <rect width="960" height="380" rx="12" fill="url(#glowBL)"/>
  <rect width="960" height="380" rx="12" fill="url(#glowCenter)"/>
  <text x="480" y="44" font-family="system-ui" font-size="22" fill="#ffffff" text-anchor="middle" font-weight="600" filter="url(#softglow)">No-Code vs Code: When to Switch</text>
  <!-- Left: No-Code -->
  <rect x="30" y="65" width="290" height="290" rx="12" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)"/>
  <text x="175" y="100" font-family="system-ui" font-size="20" fill="#ffe0a0" text-anchor="middle" font-weight="600">🔧 No-Code</text>
  <text x="175" y="128" font-family="system-ui" font-size="14" fill="rgba(255,255,255,0.6)" text-anchor="middle">Make / n8n / Airtable</text>
  <line x1="60" y1="145" x2="290" y2="145" stroke="rgba(255,255,255,0.15)"/>
  <text x="55" y="175" font-family="system-ui" font-size="15" fill="rgba(255,255,255,0.8)">✅ Quick to set up</text>
  <text x="55" y="205" font-family="system-ui" font-size="15" fill="rgba(255,255,255,0.8)">✅ 1–2 videos/week</text>
  <text x="55" y="235" font-family="system-ui" font-size="15" fill="rgba(255,255,255,0.8)">❌ Random timeouts</text>
  <text x="55" y="265" font-family="system-ui" font-size="15" fill="rgba(255,255,255,0.8)">❌ Can't do ffmpeg</text>
  <text x="55" y="295" font-family="system-ui" font-size="15" fill="rgba(255,255,255,0.8)">❌ Breaks at scale</text>
  <text x="175" y="340" font-family="system-ui" font-size="16" fill="#ffe0a0" text-anchor="middle" font-weight="600">~70% of the way</text>
  <!-- Middle: arrow -->
  <text x="370" y="215" font-family="system-ui" font-size="32" fill="rgba(255,255,255,0.5)" text-anchor="middle">→</text>
  <text x="370" y="245" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.5)" text-anchor="middle">2+ videos/day</text>
  <!-- Center: Code -->
  <rect x="410" y="65" width="290" height="290" rx="12" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)"/>
  <text x="555" y="100" font-family="system-ui" font-size="20" fill="#a0e0ff" text-anchor="middle" font-weight="600">💻 Code</text>
  <text x="555" y="128" font-family="system-ui" font-size="14" fill="rgba(255,255,255,0.6)" text-anchor="middle">Python / Node + APIs</text>
  <line x1="440" y1="145" x2="670" y2="145" stroke="rgba(255,255,255,0.15)"/>
  <text x="435" y="175" font-family="system-ui" font-size="15" fill="rgba(255,255,255,0.85)">✅ Full control</text>
  <text x="435" y="205" font-family="system-ui" font-size="15" fill="rgba(255,255,255,0.85)">✅ 5–8 videos/day</text>
  <text x="435" y="235" font-family="system-ui" font-size="15" fill="rgba(255,255,255,0.85)">✅ Retry logic</text>
  <text x="435" y="265" font-family="system-ui" font-size="15" fill="rgba(255,255,255,0.85)">✅ Parallel processing</text>
  <text x="435" y="295" font-family="system-ui" font-size="15" fill="rgba(255,255,255,0.85)">❌ Needs dev skills</text>
  <text x="555" y="340" font-family="system-ui" font-size="16" fill="#a0e0ff" text-anchor="middle" font-weight="600">100% of the way</text>
  <!-- Right: OpenSlop -->
  <rect x="740" y="65" width="190" height="290" rx="12" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.4)" stroke-dasharray="6 4"/>
  <text x="835" y="100" font-family="system-ui" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="700" filter="url(#softglow)">🚀 OpenSlop</text>
  <text x="835" y="128" font-family="system-ui" font-size="14" fill="rgba(255,255,255,0.6)" text-anchor="middle">Free &amp; open source</text>
  <line x1="760" y1="145" x2="910" y2="145" stroke="rgba(255,255,255,0.2)"/>
  <text x="755" y="175" font-family="system-ui" font-size="15" fill="rgba(255,255,255,0.9)">✅ No code</text>
  <text x="755" y="205" font-family="system-ui" font-size="15" fill="rgba(255,255,255,0.9)">✅ Full control</text>
  <text x="755" y="235" font-family="system-ui" font-size="15" fill="rgba(255,255,255,0.9)">✅ $2/video</text>
  <text x="755" y="265" font-family="system-ui" font-size="15" fill="rgba(255,255,255,0.9)">✅ Scales</text>
  <text x="835" y="340" font-family="system-ui" font-size="16" fill="#ffffff" text-anchor="middle" font-weight="600">Best of both</text>
</svg>
