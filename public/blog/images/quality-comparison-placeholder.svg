<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#7b8fcc"/>
      <stop offset="30%" stop-color="#b08aaf"/>
      <stop offset="55%" stop-color="#d98a8a"/>
      <stop offset="80%" stop-color="#e8a585"/>
      <stop offset="100%" stop-color="#f0c89a"/>
    </linearGradient>
    <radialGradient id="glowTL" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#8ba0e0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glowBR" cx="100%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#f5c490" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glowTR" cx="100%" cy="0%" r="50%">
      <stop offset="0%" stop-color="#d88a90" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glowBL" cx="0%" cy="100%" r="50%">
      <stop offset="0%" stop-color="#c8a0b8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glowCenter" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#ffe0c0" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#ffe8d0" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="960" height="360" rx="12" fill="url(#sky)"/>
  <rect width="960" height="360" rx="12" fill="url(#glowTL)"/>
  <rect width="960" height="360" rx="12" fill="url(#glowBR)"/>
  <rect width="960" height="360" rx="12" fill="url(#glowTR)"/>
  <rect width="960" height="360" rx="12" fill="url(#glowBL)"/>
  <rect width="960" height="360" rx="12" fill="url(#glowCenter)"/>
  <rect x="30" y="30" width="435" height="300" rx="12" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)"/>
  <text x="247" y="76" font-family="system-ui" font-size="22" fill="#fff0f0" text-anchor="middle" font-weight="600" filter="url(#softglow)">All-in-One Tool Output</text>
  <text x="247" y="120" font-family="system-ui" font-size="16" fill="rgba(255,255,255,0.75)" text-anchor="middle">Over-saturated colors, uncanny faces</text>
  <text x="247" y="150" font-family="system-ui" font-size="16" fill="rgba(255,255,255,0.75)" text-anchor="middle">Generic transitions, same template</text>
  <text x="247" y="180" font-family="system-ui" font-size="16" fill="rgba(255,255,255,0.75)" text-anchor="middle">No per-scene control, black box</text>
  <text x="247" y="240" font-family="system-ui" font-size="30" fill="#fff0f0" font-weight="700" text-anchor="middle" filter="url(#softglow)">$5–20/video</text>
  <text x="247" y="275" font-family="system-ui" font-size="16" fill="rgba(255,255,255,0.75)" text-anchor="middle">Looks like AI in 2 seconds</text>
  <rect x="495" y="30" width="435" height="300" rx="12" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)"/>
  <text x="712" y="76" font-family="system-ui" font-size="22" fill="#f0fff5" text-anchor="middle" font-weight="600" filter="url(#softglow)">Direct API Pipeline Output</text>
  <text x="712" y="120" font-family="system-ui" font-size="16" fill="rgba(255,255,255,0.85)" text-anchor="middle">Controlled style, seed-locked consistency</text>
  <text x="712" y="150" font-family="system-ui" font-size="16" fill="rgba(255,255,255,0.85)" text-anchor="middle">Varied transitions, natural pacing</text>
  <text x="712" y="180" font-family="system-ui" font-size="16" fill="rgba(255,255,255,0.85)" text-anchor="middle">Full control at every step</text>
  <text x="712" y="240" font-family="system-ui" font-size="30" fill="#f0fff5" font-weight="700" text-anchor="middle" filter="url(#softglow)">~$2/video</text>
  <text x="712" y="275" font-family="system-ui" font-size="16" fill="rgba(255,255,255,0.85)" text-anchor="middle">Viewers can't tell</text>
</svg>
